<!-- create a table displaying score of cricket players in a match using HTML. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Match Scorecard</title>
    <style>
        /* Page styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 30px;
        }

        /* Heading */
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        /* Table styling */
        table {
            width: 70%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        /* Table cells */
        th,
        td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        /* Header row */
        th {
            background-color: #0072ff;
            color: white;
        }

        /* Alternate row color */
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <h2>Cricket Match Scorecard</h2>

    <table>
        <tr>
            <th>Player Name</th>
            <th>Runs</th>
            <th>Balls</th>
            <th>4s</th>
            <th>6s</th>
            <th>Strike Rate</th>
        </tr>

        <tr>
            <td>Rohit Sharma</td>
            <td>78</td>
            <td>54</td>
            <td>9</td>
            <td>3</td>
            <td>144.4</td>
        </tr>

        <tr>
            <td>Virat Kohli</td>
            <td>65</td>
            <td>49</td>
            <td>7</td>
            <td>2</td>
            <td>132.6</td>
        </tr>

        <tr>
            <td>KL Rahul</td>
            <td>42</td>
            <td>38</td>
            <td>4</td>
            <td>1</td>
            <td>110.5</td>
        </tr>

        <tr>
            <td>Hardik Pandya</td>
            <td>30</td>
            <td>18</td>
            <td>2</td>
            <td>2</td>
            <td>166.7</td>
        </tr>
    </table>

</body>

</html>
