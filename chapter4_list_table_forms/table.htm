<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables - HTML</title>
    <style>
        <style>
table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    font-family: Arial, sans-serif;
}

th, td {
    border: 1px solid #333;
    padding: 10px;
    text-align: center;
    border:2px solid black;
}

th {
    background-color: #4CAF50;
    color: white;
}

tr:nth-child(even) {
    background-color: #f2f2f2;
}

tr:hover {
    background-color: #ddd;
}
</style>

    </style>
</head>
<body>
    <h1>Taables in HTML</h1>
    <table>
        <!-- Head of table -->
        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Salary</th>
            </tr>
        </thead>
        <!-- /Body of the table. -->
        <tbody>
            <tr>
                <td>Abhijeet</td>
                <td>Software Developer</td>
                <td>00000</td>
            </tr>
            <tr>
                <td>Abhi</td>
                <td>AI engineer</td>
                <td>$34343</td>
            </tr>
            
            <tr>
                <td>Renuka</td>
                <td>ML enginer</td>
                <td>$10000</td>
            </tr>
            <tr>
                <td>Thanks</td>
                <td colspan="2">you</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
